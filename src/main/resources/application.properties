spring.application.name=eduplatform-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ---------------------------------------------------------------------------
# Datasource (Neon Postgres)
# ---------------------------------------------------------------------------
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-red-poetry-ap1ayoxo-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require}
spring.datasource.username=${DATABASE_USERNAME:neondb_owner}
spring.datasource.password=${DATABASE_PASSWORD:npg_x2prBKPovwV6}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=1800000

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
spring.jpa.open-in-view=false
# Flyway owns the schema; Hibernate must not second-guess PG-specific types
# (citext, inet, jsonb, bpchar) that its validator misreports as mismatches.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.format_sql=false

# ---------------------------------------------------------------------------
# Flyway
# ---------------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public

# ---------------------------------------------------------------------------
# Mail
# ---------------------------------------------------------------------------
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# From-address for outbound mail. Real delivery happens only when MAIL_USERNAME is set;
# otherwise MailService logs OTPs / links (safe dev fallback).
app.mail.from=${MAIL_FROM:no-reply@eduplatform.local}

# ---------------------------------------------------------------------------
# Servlet / Server
# ---------------------------------------------------------------------------
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework
server.error.include-message=always
server.error.include-binding-errors=always

# ---------------------------------------------------------------------------
# Actuator
# ---------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=${spring.application.name}

# ---------------------------------------------------------------------------
# OpenAPI / Swagger
# ---------------------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
# Show every endpoint in a single Swagger document, grouped by @Tag annotations on controllers.
springdoc.paths-to-match=/api/**,/actuator/health

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.eduplatform=${LOG_LEVEL_APP:DEBUG}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}
logging.level.org.springframework.security=INFO

# ---------------------------------------------------------------------------
# Application
# ---------------------------------------------------------------------------
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.frontend.public-url=${FRONTEND_PUBLIC_URL:http://localhost:3000}
app.frontend.portal-url=${FRONTEND_PORTAL_URL:http://localhost:3001}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:5174}

# Security / JWT
app.security.jwt.issuer=${JWT_ISSUER:eduplatform}
app.security.jwt.access-secret=${JWT_ACCESS_SECRET:change-me-to-a-long-random-base64-secret-at-least-32-bytes}
app.security.jwt.access-ttl-minutes=${JWT_ACCESS_TTL_MIN:15}
app.security.jwt.refresh-ttl-days=${JWT_REFRESH_TTL_DAYS:30}
app.security.bcrypt-strength=12

# OAuth
app.oauth.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:}
app.oauth.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET:}
app.oauth.google.redirect-uri=${app.base-url}/api/auth/oauth/google/callback

app.oauth.facebook.app-id=${OAUTH_FACEBOOK_APP_ID:}
app.oauth.facebook.app-secret=${OAUTH_FACEBOOK_APP_SECRET:}
app.oauth.facebook.redirect-uri=${app.base-url}/api/auth/oauth/facebook/callback

app.oauth.apple.team-id=${APPLE_TEAM_ID:}
app.oauth.apple.services-id=${APPLE_SERVICES_ID:}
app.oauth.apple.key-id=${APPLE_KEY_ID:}
app.oauth.apple.private-key=${APPLE_PRIVATE_KEY_PEM:}
app.oauth.apple.redirect-uri=${app.base-url}/api/auth/oauth/apple/callback

# Storage
app.storage.provider=${STORAGE_PROVIDER:LOCAL}
app.storage.s3.bucket=${S3_BUCKET:}
app.storage.s3.region=${S3_REGION:}
app.storage.s3.access-key=${S3_ACCESS_KEY:}
app.storage.s3.secret-key=${S3_SECRET_KEY:}
app.storage.local.base-dir=${STORAGE_LOCAL_DIR:./var/uploads}
